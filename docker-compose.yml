# Local testing environment for Netlistify Docker container.
# Requires: NVIDIA Container Toolkit (nvidia-docker2).

services:
  netlistify:
    build:
      context: .
      dockerfile: Dockerfile
    image: netlistify:latest
    container_name: netlistify-test
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./local_input:/workspace/input:ro
      - ./local_results:/workspace/results
    ports:
      - "2222:22"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "/app/validate_container.py"]
      interval: 30s
      timeout: 15s
      retries: 2
      start_period: 60s
    restart: "no"
